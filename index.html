<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptify</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --green-dim: #158a3e;
    --black: #0a0a0a;
    --card: #111111;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(29,185,84,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(29,185,84,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .logo svg { width: 32px; height: 32px; }

  h1 {
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    background: linear-gradient(135deg, #fff 40%, var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Auth card */
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
    text-align: center;
  }

  .auth-card p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
  }

  /* Input area */
  .prompt-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .prompt-label {
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    color: var(--green);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    padding: 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 100px;
  }

  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: var(--muted); }

  .options-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    align-items: center;
  }

  .option-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .option-group label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  select, input[type="number"] {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  select:focus, input[type="number"]:focus { border-color: var(--green); }

  /* Buttons */
  .btn-primary {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }

  .btn-primary:hover:not(:disabled) {
    background: #22e865;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(29,185,84,0.3);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-spotify {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-spotify:hover {
    background: #22e865;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(29,185,84,0.3);
  }

  .btn-outline {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-outline:hover { border-color: var(--green); color: var(--green); }

  /* Playlist results */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    animation: fadeUp 0.5s ease both;
    display: none;
  }

  .results-card.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: gap;
    gap: 12px;
  }

  .results-title {
    font-size: 1.2rem;
    font-weight: 700;
  }

  .playlist-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--green);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .track-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 28px;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    transition: background 0.15s;
    cursor: default;
  }

  .track-item:hover { background: #1a1a1a; }

  .track-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .track-info { flex: 1; min-width: 0; }

  .track-name {
    font-size: 0.95rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-artist {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-check {
    font-size: 0.75rem;
    color: var(--green);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .track-item.added .track-check { opacity: 1; }

  /* Status / Loading */
  .status {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    padding: 20px;
    display: none;
  }

  .status.visible { display: block; }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  .error-msg {
    background: rgba(255,60,60,0.08);
    border: 1px solid rgba(255,60,60,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: #ff6b6b;
    margin-top: 12px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .success-banner {
    background: rgba(29,185,84,0.08);
    border: 1px solid rgba(29,185,84,0.2);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
  }

  .success-banner span { font-size: 1.4rem; }
  .success-banner p { font-size: 0.85rem; color: var(--green); font-family: 'DM Mono', monospace; }
  .success-banner a { color: var(--green); }

  /* User info */
  .user-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px 6px 6px;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .user-pill img {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    object-fit: cover;
  }

  .user-pill .dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #000;
    font-weight: 700;
  }

  .connected-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="12" fill="#1DB954"/>
        <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.45-.85 13.2 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.4.25zm-.1 2.8c-.25.35-.7.5-1.05.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.3.15.45.65.2 1zm-1.2 2.75c-.2.3-.55.4-.85.2-2.35-1.45-5.3-1.75-8.8-.95-.3.1-.65-.15-.75-.45s.15-.65.45-.75c3.8-.85 7.1-.5 9.7 1.1.35.15.4.55.25.85z" fill="white"/>
      </svg>
    </div>
    <h1>Promptify</h1>
    <p class="tagline">Décris une ambiance → Playlist Spotify</p>
  </div>

  <!-- Auth Section -->
  <div class="auth-card" id="authCard">
    <p>Connecte ton compte Spotify pour créer des playlists directement</p>
    <button class="btn-spotify" onclick="loginSpotify()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><circle cx="12" cy="12" r="12" fill="black"/><path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.45-.85 13.2 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.4.25zm-.1 2.8c-.25.35-.7.5-1.05.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.3.15.45.65.2 1zm-1.2 2.75c-.2.3-.55.4-.85.2-2.35-1.45-5.3-1.75-8.8-.95-.3.1-.65-.15-.75-.45s.15-.65.45-.75c3.8-.85 7.1-.5 9.7 1.1.35.15.4.55.25.85z" fill="white"/></svg>
      Se connecter avec Spotify
    </button>
  </div>

  <!-- Connected state (hidden by default) -->
  <div class="auth-card" id="connectedCard" style="display:none; padding: 16px 24px;">
    <div class="connected-row">
      <div class="user-pill" id="userPill">
        <div class="dot" id="userInitial">?</div>
        <span id="userName">...</span>
      </div>
      <button class="btn-outline" onclick="logout()">Déconnecter</button>
    </div>
  </div>

  <!-- Prompt Section -->
  <div class="prompt-card" id="promptCard" style="display:none;">
    <span class="prompt-label">✦ Décris ta playlist</span>
    <textarea id="promptInput" placeholder="Ex: rap français mélancolique pour conduire la nuit, ou jazz lo-fi pour travailler concentré..." rows="3"></textarea>
    
    <div class="options-row">
      <div class="option-group">
        <label>Nombre de titres</label>
        <input type="number" id="trackCount" value="15" min="5" max="30">
      </div>
      <div class="option-group">
        <label>Nom de la playlist</label>
        <input type="text" id="playlistName" placeholder="Auto-généré" style="background:#0d0d0d;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:0.9rem;padding:10px 12px;outline:none;width:100%;transition:border-color 0.2s;">
      </div>
    </div>

    <button class="btn-primary" id="generateBtn" onclick="generatePlaylist()">
      <span>✦</span> Générer la playlist
    </button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Status -->
  <div class="status" id="statusMsg">
    <span class="spinner"></span> <span id="statusText">Génération en cours...</span>
  </div>

  <!-- Results -->
  <div class="results-card" id="resultsCard">
    <div class="results-header">
      <div>
        <div class="playlist-name" id="resultPlaylistName">PLAYLIST</div>
        <div class="results-title" id="resultTitle">Titre de la playlist</div>
      </div>
      <button class="btn-outline" onclick="resetForm()">← Nouveau</button>
    </div>

    <ul class="track-list" id="trackList"></ul>

    <div style="text-align:center;">
      <button class="btn-primary" id="createBtn" onclick="createSpotifyPlaylist()" style="max-width:360px;margin:0 auto;">
        <svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="black"/><path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.45-.85 13.2 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.4.25zm-.1 2.8c-.25.35-.7.5-1.05.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.3.15.45.65.2 1zm-1.2 2.75c-.2.3-.55.4-.85.2-2.35-1.45-5.3-1.75-8.8-.95-.3.1-.65-.15-.75-.45s.15-.65.45-.75c3.8-.85 7.1-.5 9.7 1.1.35.15.4.55.25.85z" fill="white"/></svg>
        Créer sur Spotify
      </button>
    </div>

    <div id="successBanner" style="display:none;" class="success-banner">
      <span>🎵</span>
      <p id="successText">Playlist créée ! <a id="playlistLink" href="#" target="_blank">Ouvrir dans Spotify →</a></p>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '1df024da05ef40238af6250e1f9040ce';
const REDIRECT_URI = 'https://gregarious-bienenstitch-dd1f80.netlify.app/';
const SCOPES = 'playlist-modify-public playlist-modify-private user-read-private user-read-email';

let accessToken = null;
let userId = null;
let generatedTracks = [];

// ─── AUTH ───────────────────────────────────────────────────────
function loginSpotify() {
  const state = Math.random().toString(36).substring(2);
  sessionStorage.setItem('spotify_state', state);
  const params = new URLSearchParams({
    response_type: 'token',
    client_id: CLIENT_ID,
    scope: SCOPES,
    redirect_uri: REDIRECT_URI,
    state
  });
  window.location.href = `https://accounts.spotify.com/authorize?${params}`;
}

function logout() {
  accessToken = null;
  userId = null;
  sessionStorage.removeItem('spotify_token');
  document.getElementById('authCard').style.display = 'block';
  document.getElementById('connectedCard').style.display = 'none';
  document.getElementById('promptCard').style.display = 'none';
}

function handleCallback() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (token) {
    accessToken = token;
    sessionStorage.setItem('spotify_token', token);
    window.history.replaceState({}, document.title, window.location.pathname);
    initConnected();
  }
}

function checkSession() {
  const token = sessionStorage.getItem('spotify_token');
  if (token) { accessToken = token; initConnected(); }
}

async function initConnected() {
  try {
    const res = await fetch('https://api.spotify.com/v1/me', {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    userId = data.id;
    document.getElementById('userInitial').textContent = (data.display_name || data.id)[0].toUpperCase();
    document.getElementById('userName').textContent = data.display_name || data.id;
    document.getElementById('authCard').style.display = 'none';
    document.getElementById('connectedCard').style.display = 'block';
    document.getElementById('promptCard').style.display = 'block';
  } catch {
    logout();
  }
}

// ─── GENERATE ────────────────────────────────────────────────────
async function generatePlaylist() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) return showError('Décris une ambiance d\'abord !');

  setLoading(true, 'L\'IA compose ta playlist...');
  hideError();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Tu es un expert en musique. Génère une playlist Spotify pour cette ambiance : "${prompt}".
Réponds UNIQUEMENT en JSON, sans markdown ni backticks. Format :
{
  "playlist_name": "Nom créatif de la playlist",
  "tracks": [
    { "title": "Titre exact du morceau", "artist": "Nom exact de l'artiste" }
  ]
}
Génère exactement ${document.getElementById('trackCount').value} morceaux variés et pertinents. Sois précis sur les titres et artistes pour que Spotify puisse les trouver.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    generatedTracks = parsed.tracks;
    const customName = document.getElementById('playlistName').value.trim();
    const playlistTitle = customName || parsed.playlist_name;

    renderTracks(generatedTracks, playlistTitle, prompt);
    setLoading(false);
  } catch (e) {
    setLoading(false);
    showError('Erreur lors de la génération. Réessaie !');
  }
}

function renderTracks(tracks, name, prompt) {
  document.getElementById('resultPlaylistName').textContent = prompt.toUpperCase();
  document.getElementById('resultTitle').textContent = name;

  const list = document.getElementById('trackList');
  list.innerHTML = tracks.map((t, i) => `
    <li class="track-item" id="track-${i}">
      <span class="track-num">${String(i+1).padStart(2,'0')}</span>
      <div class="track-info">
        <div class="track-name">${t.title}</div>
        <div class="track-artist">${t.artist}</div>
      </div>
      <span class="track-check">✓</span>
    </li>
  `).join('');

  document.getElementById('resultsCard').classList.add('visible');
  document.getElementById('successBanner').style.display = 'none';
  document.getElementById('createBtn').disabled = false;
  document.getElementById('createBtn').textContent = '';
  document.getElementById('createBtn').innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="black"/><path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.45-.85 13.2 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.4.25zm-.1 2.8c-.25.35-.7.5-1.05.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.3.15.45.65.2 1zm-1.2 2.75c-.2.3-.55.4-.85.2-2.35-1.45-5.3-1.75-8.8-.95-.3.1-.65-.15-.75-.45s.15-.65.45-.75c3.8-.85 7.1-.5 9.7 1.1.35.15.4.55.25.85z" fill="white"/></svg> Créer sur Spotify`;
  document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── CREATE PLAYLIST ─────────────────────────────────────────────
async function createSpotifyPlaylist() {
  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="border-color:#0003;border-top-color:#000"></span> Création...';

  const name = document.getElementById('resultTitle').textContent;

  try {
    // 1. Create playlist
    const plRes = await fetch(`https://api.spotify.com/v1/users/${userId}/playlists`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description: 'Créée par Promptify ✦', public: true })
    });
    const playlist = await plRes.json();
    const playlistId = playlist.id;

    // 2. Search & collect track URIs
    setLoading(true, 'Recherche des morceaux sur Spotify...');
    const uris = [];
    for (let i = 0; i < generatedTracks.length; i++) {
      const t = generatedTracks[i];
      const q = encodeURIComponent(`${t.title} ${t.artist}`);
      const sRes = await fetch(`https://api.spotify.com/v1/search?q=${q}&type=track&limit=1`, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      const sData = await sRes.json();
      if (sData.tracks?.items?.length > 0) {
        uris.push(sData.tracks.items[0].uri);
        document.getElementById(`track-${i}`)?.classList.add('added');
      }
      setLoading(true, `Recherche ${i+1}/${generatedTracks.length}...`);
    }

    // 3. Add tracks
    if (uris.length > 0) {
      await fetch(`https://api.spotify.com/v1/playlists/${playlistId}/tracks`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris })
      });
    }

    setLoading(false);
    document.getElementById('playlistLink').href = `https://open.spotify.com/playlist/${playlistId}`;
    document.getElementById('successText').innerHTML = `${uris.length} titres ajoutés ! <a id="playlistLink" href="https://open.spotify.com/playlist/${playlistId}" target="_blank">Ouvrir dans Spotify →</a>`;
    document.getElementById('successBanner').style.display = 'flex';
    btn.innerHTML = '✓ Playlist créée !';
    btn.style.background = '#158a3e';

  } catch (e) {
    setLoading(false);
    btn.disabled = false;
    btn.innerHTML = 'Réessayer';
    showError('Erreur lors de la création. Vérifie ta connexion Spotify.');
  }
}

// ─── UI HELPERS ──────────────────────────────────────────────────
function setLoading(on, msg = '') {
  const s = document.getElementById('statusMsg');
  const g = document.getElementById('generateBtn');
  s.classList.toggle('visible', on);
  if (on) document.getElementById('statusText').textContent = msg;
  if (g) g.disabled = on;
}

function showError(msg) {
  const e = document.getElementById('errorMsg');
  e.textContent = msg;
  e.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function resetForm() {
  document.getElementById('resultsCard').classList.remove('visible');
  document.getElementById('promptInput').value = '';
  document.getElementById('playlistName').value = '';
  document.getElementById('promptInput').focus();
}

// ─── INIT ────────────────────────────────────────────────────────
if (window.location.hash.includes('access_token')) {
  handleCallback();
} else {
  checkSession();
}
</script>
